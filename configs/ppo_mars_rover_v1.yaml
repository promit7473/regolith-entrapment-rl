# PPO hyperparameters for Mars Rover regolith entrapment recovery
# Reference config — actual hyperparameters are set inline in scripts/train.py

experiment:
  name: mars_rover_regolith_v1
  directory: experiments/regolith_recovery
  checkpoint_interval: 2000
  write_interval: 100

ppo:
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: true
  entropy_loss_scale: 0.02
  value_loss_scale: 1.0

model:
  # Recurrent PPO with GRU (temporal modeling for entrapment detection + rocking)
  recurrence_type: gru
  gru_hidden: 256
  gru_layers: 1
  sequence_length: 16      # BPTT window; rollouts must be divisible by this
  encoder_dim: 128
  head_layers: [64]
  activation: elu

environment:
  num_envs: 64            # 5070Ti safe default; scale to 512 on 4090
  episode_length_s: 20.0
  decimation: 2           # policy at 25 Hz
  physics_dt: 0.02        # 50 Hz

reward:
    forward_progress: 3.0  # Increased from 2.0 for stronger learning signal
    escape_bonus: 5.0
    pen_slip: 1.0
    pen_tilt: 0.3
    pen_action_delta: 0.05
    pen_abnormal: 0.5      # Penalty for sustained anomalous states
    rew_rocking: 1.0       # Bonus for rocking motion when trapped

solver:
  type: mujoco_warp       # MJWarpSolverCfg — stable articulated robot contacts
  nconmax: 50
  njmax: 200
  iterations: 100
  cone: elliptic
  impratio: 100
  num_substeps: 4

mpm:
  voxel_size: 0.05
  sand_half_x: 1.0          # 2.0 m × 2.0 m patch (up from 1.2 m × 1.2 m)
  sand_half_y: 1.0
  sand_depth: 0.15
  particle_mu: 0.7
  particle_ke: 5.0e4     # 5e4 Pa (lower to avoid CFL violations; higher causes particle explosions)

training:
  seed: 42
  timesteps: 200000       # short run for 5070Ti; 2M on 4090
