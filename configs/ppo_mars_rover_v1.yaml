# PPO hyperparameters for Mars Rover regolith entrapment recovery
# This file is a reference mirror of the values hardcoded in scripts/train.py.
# It is NOT loaded at runtime — train.py sets all values inline.
# Keep this in sync manually when changing train.py.

experiment:
  name: ppo_gru_regolith
  directory: experiments/regolith_recovery
  checkpoint_interval: 2000
  write_interval: 100

ppo:
  rollouts: 64              # train.py ROLLOUTS=64
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: true
  entropy_loss_scale: 0.03  # 0.02 caused policy collapse in prior run
  value_loss_scale: 1.0

model:
  # Recurrent PPO with GRU (temporal modeling for entrapment detection + rocking)
  recurrence_type: gru
  gru_hidden: 256           # train.py GRU_HIDDEN=256
  gru_layers: 1             # train.py GRU_LAYERS=1
  sequence_length: 32       # train.py SEQ_LEN=32 (~1.3s at 25Hz)
  encoder_dim: 128
  head_layers: [64]
  activation: elu

environment:
  num_envs: 64              # 5070Ti safe default; scale to 512 on 4090
  episode_length_s: 30.0    # entrapment_env.py episode_length_s=30.0
  decimation: 2             # policy at 25 Hz
  physics_dt: 0.02          # 50 Hz

reward:
  forward_progress: 1.5     # entrapment_env.py rew_forward_progress=1.5
  escape_bonus: 20.0        # entrapment_env.py rew_escape_bonus=20.0
  pen_slip: 0.5             # entrapment_env.py pen_slip=0.5
  pen_tilt: 0.3
  pen_action_delta: 0.05
  pen_abnormal: 0.3         # entrapment_env.py pen_abnormal=0.3
  rew_rocking: 2.0          # entrapment_env.py rew_rocking=2.0

solver:
  type: mujoco_cpu          # use_mujoco_cpu=True (MJWarpSolverCfg bypass)
  iterations: 4
  num_substeps: 4

mpm:
  voxel_size: 0.05
  sand_half_x: 1.0          # 2.0 m × 2.0 m patch
  sand_half_y: 1.0
  sand_depth: 0.25          # entrapment_env.py SAND_DEPTH=0.25 (deeper for axle-level burial)
  particle_mu: 0.9          # entrapment_env.py µ=0.9
  particle_ke: 2.0e5        # entrapment_env.py ke=2e5

domain_randomization:
  motor_gain_range: [0.8, 1.2]
  obs_noise_std: 0.02
  sinkage_range: [0.12, 0.22]  # m — axle-level burial (not just rim)

training:
  seed: 42
  timesteps: 200000
